<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure Nature - Organic Store</title>
    
    <!-- Tailwind CSS - This warning is normal for development -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.min.css">
    
    <style>
        :root { --primary: #6B7C5B; --secondary: #F5F3F0; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .font-sans { font-family: 'Inter', sans-serif; }
        .font-logo { font-family: 'Pacifico', cursive; }
        
        .hero-slide { background-size: cover; background-position: center; }
        .product-modal { backdrop-filter: blur(10px); background: rgba(0, 0, 0, 0.5); }
        
        .fade-in {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s ease;
        }
        .fade-in.visible { opacity: 1; transform: translateY(0); }
        
        .category-filter.active {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
        }
    </style>
</head>
<body class="font-sans text-gray-800 bg-white">
    <!-- Loading Spinner -->
    <div id="loading" class="fixed inset-0 bg-white z-50 flex items-center justify-center">
        <div class="text-center">
            <div class="w-16 h-16 border-4 border-primary border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
            <p class="text-gray-600">Loading Pure Nature...</p>
        </div>
    </div>

    <!-- Main Content -->
    <div id="app" class="hidden"></div>

    <!-- Product Modal -->
    <div id="product-modal" class="product-modal fixed inset-0 z-50 hidden">
        <div class="flex items-center justify-center min-h-screen p-4">
            <div class="bg-white rounded-2xl max-w-4xl w-full max-h-[90vh] overflow-y-auto">
                <div class="p-6" id="modal-content"></div>
            </div>
        </div>
    </div>

    <!-- Order Modal -->
    <div id="order-modal" class="product-modal fixed inset-0 z-50 hidden">
        <div class="flex items-center justify-center min-h-screen p-4">
            <div class="bg-white rounded-2xl max-w-md w-full p-6" id="order-form-container"></div>
        </div>
    </div>

    <script>
        // Default content in case JSON files aren't found
        const defaultContent = {
            site: {
                store_name: "Pure Nature",
                tagline: "Organic Handmade Products",
                whatsapp_number: "923001234567",
                navigation: [
                    { label: "Home", link: "#home", order: 1 },
                    { label: "About", link: "#about", order: 2 },
                    { label: "Products", link: "#products", order: 3 },
                    { label: "Contact", link: "#contact", order: 4 }
                ]
            },
            hero: {
                enabled: true,
                slides: [{
                    title_line1: "Pure Nature",
                    title_line2: "Organic Living",
                    description: "Discover the power of nature with our handcrafted, chemical-free organic products.",
                    button_text: "Shop Now",
                    button_link: "#products",
                    background_image: "https://images.unsplash.com/photo-1544367567-0f2fcb009e0b?w=1920",
                    overlay_opacity: 20
                }]
            },
            about: {
                enabled: true,
                title: "Our Story of Natural Wellness",
                content_blocks: [{
                    text: "Born from a passion for pure, natural living, Pure Nature began as a small family initiative to create chemical-free products that nurture both body and soul."
                }],
                promise: {
                    title: "100% Natural Promise",
                    text: "No chemicals, no compromises",
                    icon: "leaf"
                },
                image: "https://images.unsplash.com/photo-1600334129128-685c5582fd35?w=600"
            },
            whyChoose: {
                enabled: true,
                title: "Why Choose Pure Nature",
                features: [
                    { icon: "leaf", title: "100% Organic", description: "Certified organic ingredients" },
                    { icon: "hand-heart", title: "Handmade", description: "Crafted with traditional methods" },
                    { icon: "shield-check", title: "No Chemicals", description: "Free from harmful additives" },
                    { icon: "time", title: "Fresh & Safe", description: "Made fresh to order" }
                ]
            },
            categories: {
                enabled: true,
                title: "Our Product Categories",
                categories: [
                    { id: "skincare", name: "Skincare", description: "Natural face & body care", image: "https://images.unsplash.com/photo-1556228720-195a672e8a03?w=400" },
                    { id: "oils", name: "Herbal Oils", description: "Pure essential oils", image: "https://images.unsplash.com/photo-1608571423902-eed4a5ad8108?w=400" },
                    { id: "soaps", name: "Natural Soaps", description: "Handcrafted bars", image: "https://images.unsplash.com/photo-1600857062242-98e5d2a3c7a0?w=400" },
                    { id: "foods", name: "Organic Foods", description: "Pure honey & superfoods", image: "https://images.unsplash.com/photo-1587049352851-5d83071a9f4a?w=400" },
                    { id: "teas", name: "Herbal Teas", description: "Wellness tea blends", image: "https://images.unsplash.com/photo-1563911892437-1feda0179e1b?w=400" }
                ]
            },
            products: [
                {
                    name: "Rose Face Cream",
                    category: "skincare",
                    short_description: "Nourishing organic rose cream",
                    price: 2500,
                    rating: 5,
                    reviews_count: 24,
                    main_image: "https://images.unsplash.com/photo-1556229010-aa3f7ff66b24?w=300",
                    in_stock: true
                },
                {
                    name: "Lavender Oil",
                    category: "oils",
                    short_description: "Pure essential oil for relaxation",
                    price: 2800,
                    rating: 5,
                    reviews_count: 35,
                    main_image: "https://images.unsplash.com/photo-1608571423902-eed4a5ad8108?w=300",
                    in_stock: true
                },
                {
                    name: "Oatmeal Soap",
                    category: "soaps",
                    short_description: "Gentle exfoliating soap",
                    price: 800,
                    rating: 5,
                    reviews_count: 33,
                    main_image: "https://images.unsplash.com/photo-1600857062242-98e5d2a3c7a0?w=300",
                    in_stock: true
                },
                {
                    name: "Raw Honey",
                    category: "foods",
                    short_description: "Pure unprocessed honey",
                    price: 1800,
                    rating: 5,
                    reviews_count: 45,
                    main_image: "https://images.unsplash.com/photo-1587049352851-5d83071a9f4a?w=300",
                    in_stock: true
                },
                {
                    name: "Chamomile Tea",
                    category: "teas",
                    short_description: "Calming herbal tea",
                    price: 1500,
                    rating: 5,
                    reviews_count: 39,
                    main_image: "https://images.unsplash.com/photo-1563911892437-1feda0179e1b?w=300",
                    in_stock: true
                }
            ],
            testimonials: [
                {
                    customer_name: "Sarah Ahmed",
                    rating: 5,
                    review_text: "The rose face cream transformed my skin completely!",
                    city: "Karachi",
                    verified_purchase: true,
                    approved: true
                },
                {
                    customer_name: "Ali Hassan",
                    rating: 5,
                    review_text: "Best honey I've ever tasted! Pure and natural.",
                    city: "Lahore",
                    verified_purchase: true,
                    approved: true
                }
            ],
            faqs: [
                {
                    question: "How do you ensure product freshness?",
                    answer: "We make all products fresh to order and deliver within 2-3 days.",
                    category: "General",
                    order: 1
                },
                {
                    question: "What payment methods do you accept?",
                    answer: "Cash on delivery, JazzCash, EasyPaisa, and bank transfer.",
                    category: "Payment",
                    order: 2
                }
            ],
            footer: {
                description: "Bringing you the finest organic, handmade products for natural wellness.",
                copyright_text: "© 2024 Pure Nature. All rights reserved."
            }
        };

        // Global state
        let siteData = { ...defaultContent };
        let cart = JSON.parse(localStorage.getItem('cart') || '[]');

        // Load all content with error handling
        async function loadContent() {
            try {
                // Try to load JSON files, fall back to defaults if they fail
                const fetchWithFallback = async (url, fallback) => {
                    try {
                        const response = await fetch(url);
                        if (!response.ok) throw new Error(`HTTP ${response.status}`);
                        const data = await response.json();
                        return data;
                    } catch (error) {
                        console.log(`Using default content for ${url}`);
                        return fallback;
                    }
                };

                const [site, hero, about, whyChoose, cats, bestSellers, ordering, promise, footer] = await Promise.all([
                    fetchWithFallback('/src/content/site.json', defaultContent.site),
                    fetchWithFallback('/src/content/hero.json', defaultContent.hero),
                    fetchWithFallback('/src/content/about.json', defaultContent.about),
                    fetchWithFallback('/src/content/why-choose.json', defaultContent.whyChoose),
                    fetchWithFallback('/src/content/categories.json', defaultContent.categories),
                    fetchWithFallback('/src/content/best-sellers.json', { enabled: true, title: "Best Sellers" }),
                    fetchWithFallback('/src/content/ordering.json', { enabled: true, title: "How to Order" }),
                    fetchWithFallback('/src/content/promise.json', { enabled: true, title: "Our Promise" }),
                    fetchWithFallback('/src/content/footer.json', defaultContent.footer)
                ]);

                // Store in global state
                siteData = {
                    site: site || defaultContent.site,
                    hero: hero || defaultContent.hero,
                    about: about || defaultContent.about,
                    whyChoose: whyChoose || defaultContent.whyChoose,
                    categories: cats || defaultContent.categories,
                    bestSellers: bestSellers || { enabled: true, title: "Best Sellers" },
                    ordering: ordering || { enabled: true, title: "How to Order" },
                    promise: promise || { enabled: true, title: "Our Promise" },
                    footer: footer || defaultContent.footer,
                    products: defaultContent.products,
                    testimonials: defaultContent.testimonials,
                    faqs: defaultContent.faqs
                };

                // Try to load products collection if it exists
                try {
                    const productsResponse = await fetch('/src/content/products/index.json');
                    if (productsResponse.ok) {
                        const productsList = await productsResponse.json();
                        const loadedProducts = await Promise.all(productsList.map(async (p) => {
                            const res = await fetch(`/src/content/products/${p.file}`);
                            return res.json();
                        }));
                        if (loadedProducts.length > 0) {
                            siteData.products = loadedProducts;
                        }
                    }
                } catch (e) {
                    console.log('Using default products');
                }

                // Try to load testimonials
                try {
                    const testimonialsResponse = await fetch('/src/content/testimonials/index.json');
                    if (testimonialsResponse.ok) {
                        const testimonialsList = await testimonialsResponse.json();
                        const loadedTestimonials = await Promise.all(testimonialsList.map(async (t) => {
                            const res = await fetch(`/src/content/testimonials/${t.file}`);
                            return res.json();
                        }));
                        if (loadedTestimonials.length > 0) {
                            siteData.testimonials = loadedTestimonials.filter(t => t.approved);
                        }
                    }
                } catch (e) {
                    console.log('Using default testimonials');
                }

                // Try to load FAQs
                try {
                    const faqsResponse = await fetch('/src/content/faq/index.json');
                    if (faqsResponse.ok) {
                        const faqsList = await faqsResponse.json();
                        const loadedFaqs = await Promise.all(faqsList.map(async (f) => {
                            const res = await fetch(`/src/content/faq/${f.file}`);
                            return res.json();
                        }));
                        if (loadedFaqs.length > 0) {
                            siteData.faqs = loadedFaqs.sort((a,b) => (a.order || 0) - (b.order || 0));
                        }
                    }
                } catch (e) {
                    console.log('Using default FAQs');
                }

                // Render the site
                renderSite();
                
                // Hide loading spinner
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                
            } catch (error) {
                console.error('Error loading content:', error);
                // Use default content
                siteData = defaultContent;
                renderSite();
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
            }
        }

        // Render function (simplified version - you can expand this)
        function renderSite() {
            const app = document.getElementById('app');
            const { site, hero, about, whyChoose, categories, products, testimonials, faqs, footer } = siteData;
            
            app.innerHTML = `
                <!-- Navigation -->
                <nav class="bg-white shadow-sm sticky top-0 z-40">
                    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div class="flex justify-between items-center h-16">
                            <div class="font-logo text-2xl text-primary">${site.store_name}</div>
                            <div class="hidden md:flex space-x-8">
                                ${(site.navigation || []).map(item => `
                                    <a href="${item.link}" class="text-gray-700 hover:text-primary transition-colors">${item.label}</a>
                                `).join('')}
                            </div>
                            <button onclick="openWhatsApp()" class="bg-primary text-white px-6 py-2 rounded-button hover:bg-opacity-90">
                                <i class="ri-whatsapp-line mr-2"></i>WhatsApp
                            </button>
                        </div>
                    </div>
                </nav>

                <!-- Hero Section -->
                ${hero.enabled ? `
                <section id="home" class="relative">
                    <div class="hero-slide min-h-screen flex items-center relative" 
                         style="background-image: url('${hero.slides[0].background_image}');">
                        <div class="absolute inset-0 bg-black bg-opacity-${hero.slides[0].overlay_opacity}"></div>
                        <div class="relative z-10 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 w-full">
                            <div class="max-w-2xl">
                                <h1 class="font-serif text-5xl md:text-6xl font-bold text-white mb-6 leading-tight">
                                    ${hero.slides[0].title_line1}<br>
                                    <span class="text-yellow-200">${hero.slides[0].title_line2}</span>
                                </h1>
                                <p class="text-xl text-white mb-8">${hero.slides[0].description}</p>
                                <a href="${hero.slides[0].button_link}" class="inline-block bg-yellow-500 text-gray-900 px-8 py-4 text-lg font-semibold rounded-button hover:bg-yellow-400">
                                    ${hero.slides[0].button_text}
                                </a>
                            </div>
                        </div>
                    </div>
                </section>
                ` : ''}

                <!-- Products Grid -->
                <section id="products" class="py-20">
                    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div class="text-center mb-16 fade-in">
                            <h2 class="font-serif text-4xl font-bold text-gray-900 mb-6">Our Products</h2>
                            <p class="text-xl text-gray-600">Handpicked organic products for your wellness journey</p>
                        </div>
                        
                        <!-- Products Grid -->
                        <div id="products-grid" class="grid md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
                            ${products.map(product => `
                                <div class="product-card bg-white rounded-xl overflow-hidden shadow-sm hover:shadow-lg transition-shadow fade-in" 
                                     data-category="${product.category}">
                                    <img src="${product.main_image}" alt="${product.name}" class="w-full h-48 object-cover">
                                    <div class="p-4">
                                        <h3 class="font-serif text-lg font-semibold text-gray-900 mb-2">${product.name}</h3>
                                        <p class="text-gray-600 text-sm mb-3">${product.short_description}</p>
                                        <div class="flex items-center mb-3">
                                            <div class="flex text-yellow-500">
                                                ${Array.from({length: 5}, (_, i) => `
                                                    <i class="ri-${i < Math.floor(product.rating) ? 'star-fill' : 'star-line'} text-sm"></i>
                                                `).join('')}
                                            </div>
                                            <span class="text-gray-500 text-sm ml-2">(${product.reviews_count})</span>
                                        </div>
                                        <div class="flex justify-between items-center">
                                            <span class="font-semibold text-gray-900">PKR ${product.price}</span>
                                            <button class="bg-yellow-500 text-gray-900 px-4 py-2 text-sm rounded-button hover:bg-yellow-400" 
                                                    onclick="alert('Add to cart: ${product.name}')">
                                                Add to Cart
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </section>

                <!-- Simple Footer -->
                <footer class="bg-gray-900 text-white py-12">
                    <div class="max-w-6xl mx-auto px-4 text-center">
                        <div class="font-logo text-3xl text-yellow-500 mb-4">${site.store_name}</div>
                        <p class="text-gray-300 mb-4">${footer.description}</p>
                        <p class="text-gray-400">${footer.copyright_text}</p>
                    </div>
                </footer>
            `;
        }

        function openWhatsApp() {
            window.open(`https://wa.me/${siteData.site.whatsapp_number}`, '_blank');
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', loadContent);
    </script>
</body>
</html>
